<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVK-TNCSC Union | Digital Portal</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { --maroon: #800000; --gold: #DAA520; --dark: #333; }
        body { font-family: 'Arial', sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        
        nav { 
            background: var(--maroon); padding: 15px; color: white; text-align: center; font-weight: bold; font-size: 1.2rem; 
            border-bottom: 4px solid var(--gold); display: flex; justify-content: center; align-items: center; gap: 15px;
        }
        .nav-flag { height: 45px; }

        .banner { background: white; padding: 20px; display: flex; justify-content: center; align-items: center; gap: 40px; border-bottom: 1px solid #ddd; }
        .leader-img { height: 140px; border-radius: 10px; border: 2px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .banner-text h1 { color: var(--maroon); margin: 0; font-size: 2rem; }

        .main-container { max-width: 850px; margin: 25px auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-top: 10px solid var(--maroon); }
        form { padding: 35px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-group { display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; }
        label { font-weight: bold; margin-bottom: 8px; color: var(--dark); }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        .submit-btn { grid-column: span 2; background: var(--maroon); color: white; padding: 18px; border: none; border-radius: 6px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background: #600000; }

        /* ID Card with Watermark */
        #id-card-hidden { 
            position: absolute; left: -9999px; width: 350px; height: 530px; 
            background: white; border: 6px solid var(--maroon); padding: 0; text-align: center; overflow: hidden;
        }
        .watermark {
            position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
            width: 260px; opacity: 0.12; z-index: 0; pointer-events: none;
        }
        .card-header { background: var(--maroon); padding: 12px; color: white; position: relative; z-index: 1; }
        .card-flag-mini { height: 35px; }
        .leader-mini { position: absolute; right: 15px; top: 65px; height: 75px; border: 1px solid var(--gold); border-radius: 5px; z-index: 1; }
        .id-photo-box { width: 120px; height: 145px; border: 2px solid var(--maroon); margin: 15px auto; object-fit: cover; position: relative; z-index: 1; background: #fff; }
        .card-body { position: relative; z-index: 1; text-align: left; padding: 0 25px; font-size: 14px; line-height: 2; }
    </style>
</head>
<body>

<nav>
    <img src="https://raw.githubusercontent.com/tvktncsc/home/main/flag.png" class="nav-flag"> 
    தமிழக வெற்றிக் கழகப் பணியாளர் சங்கம் (TNCSC)
</nav>

<div class="banner">
    <img src="https://raw.githubusercontent.com/tvktncsc/home/main/vijay.png" class="leader-img">
    <div class="banner-text">
        <h1>உறுப்பினர் சேர்க்கை - 2026</h1>
        <p style="color: var(--gold); font-weight: bold;">"பிறப்பொக்கும் எல்லா உயிர்க்கும்"</p>
    </div>
</div>

<div class="main-container">
    <form id="unionForm">
        <div class="input-group">
            <label>முழு பெயர் (Tamil)</label>
            <input type="text" id="name" placeholder="உங்கள் பெயர்" required>
        </div>
        <div class="input-group">
            <label>பணியாளர் எண் (Emp ID)</label>
            <input type="text" id="emp_id" placeholder="048XXXX" required>
        </div>
        <div class="input-group">
            <label>பதவி (Designation)</label>
            <input type="text" id="designation" placeholder="எ.கா: கண்காணிப்பாளர்" required>
        </div>
        <div class="input-group">
            <label>கைபேசி எண்</label>
            <input type="tel" id="mobile" placeholder="9876543210" required>
        </div>
        <div class="input-group full-width">
            <label>மண்டலம் / மாவட்டம்</label>
            <select id="district" required>
                <option value="">தேர்வு செய்யவும்</option>
                <optgroup label="சென்னை மண்டலம்">
                    <option value="Chennai North">சென்னை வடக்கு (Chennai North)</option>
                    <option value="Chennai South">சென்னை தெற்கு (Chennai South)</option>
                </optgroup>
                <optgroup label="இதர மாவட்டங்கள்">
                    <option value="Ariyalur">அரியலூர்</option>
                    <option value="Chengalpattu">செங்கல்பட்டு</option>
                    <option value="Coimbatore">கோயம்புத்தூர்</option>
                    <option value="Cuddalore">கடலூர்</option>
                    <option value="Dharmapuri">தர்மபுரி</option>
                    <option value="Dindigul">திண்டுக்கல்</option>
                    <option value="Erode">ஈரோடு</option>
                    <option value="Kallakurichi">கள்ளக்குறிச்சி</option>
                    <option value="Kancheepuram">காஞ்சிபுரம்</option>
                    <option value="Kanniyakumari">கன்னியாகுமரி</option>
                    <option value="Karur">கரூர்</option>
                    <option value="Krishnagiri">கிருஷ்ணகிரி</option>
                    <option value="Madurai">மதுரை</option>
                    <option value="Mayiladuthurai">மயிலாடுதுறை</option>
                    <option value="Nagapattinam">நாகப்பட்டினம்</option>
                    <option value="Namakkal">நாமக்கல்</option>
                    <option value="Nilgiris">நீலகிரி</option>
                    <option value="Perambalur">பெரம்பலூர்</option>
                    <option value="Pudukkottai">புதுக்கோட்டை</option>
                    <option value="Ramanathapuram">ராமநாதபுரம்</option>
                    <option value="Ranipet">ராணிப்பேட்டை</option>
                    <option value="Salem">சேலம்</option>
                    <option value="Sivaganga">சிவங்கை</option>
                    <option value="Tenkasi">தென்காசி</option>
                    <option value="Thanjavur">தஞ்சாவூர்</option>
                    <option value="Theni">தேனி</option>
                    <option value="Thoothukudi">தூத்துக்குடி</option>
                    <option value="Tiruchirappalli">திருச்சிராப்பள்ளி</option>
                    <option value="Tirunelveli">திருநெல்வேலி</option>
                    <option value="Tirupathur">திருப்பத்தூர்</option>
                    <option value="Tiruppur">திருப்பூர்</option>
                    <option value="Tiruvallur">திருவள்ளூர்</option>
                    <option value="Tiruvannamalai">திருவண்ணாமலை</option>
                    <option value="Tiruvarur">திருவாரூர்</option>
                    <option value="Vellore">வேலூர்</option>
                    <option value="Viluppuram">விழுப்புரம்</option>
                    <option value="Virudhunagar">விருதுநகர்</option>
                </optgroup>
            </select>
        </div>
        <div class="input-group full-width">
            <label>புகைப்படம் பதிவேற்றவும்</label>
            <input type="file" id="userPhoto" accept="image/*" required>
        </div>
        <button type="submit" class="submit-btn" id="btnText">பதிவு செய்து தற்காலிக ID பெறவும்</button>
    </form>
</div>

<div id="id-card-hidden">
    <img src="https://raw.githubusercontent.com/tvktncsc/home/main/watermark.jpeg" class="watermark">
    <div class="card-header">
        <img src="https://raw.githubusercontent.com/tvktncsc/home/main/flag.png" class="card-flag-mini"><br>
        <span style="font-size: 18px; font-weight: bold;">தமிழக வெற்றிக் கழகம்</span>
    </div>
    <img src="https://raw.githubusercontent.com/tvktncsc/home/main/vijay.png" class="leader-mini">
    <p style="color: var(--maroon); font-size: 11px; font-weight: bold; position: relative; z-index: 1;">
        தற்காலிக உறுப்பினர் அடையாள அட்டை
    </p>
    <img id="card-photo" src="" class="id-photo-box">
    <div class="card-body">
        <p style="margin:0;"><strong>பெயர்:</strong> <span id="c-name"></span></p>
        <p style="margin:0;"><strong>உறுப்பினர் எண்:</strong> <span id="c-id" style="color: red; font-weight: bold;"></span></p>
        <p style="margin:0;"><strong>பதவி:</strong> <span id="c-desig"></span></p>
        <p style="margin:0;"><strong>மாவட்டம்:</strong> <span id="c-dist"></span></p>
    </div>
    <div style="margin-top: 20px; border-top: 1.5px solid var(--gold); padding-top: 10px; color: #800000; font-weight: bold; position: relative; z-index: 1;">
        "பிறப்பொக்கும் எல்லா உயிர்க்கும்"
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvgdhnzmUuUbi98w-qFAUJOd3D83wFLO5vWTOU0ZBndv0y56R5ONr-KGHC15DkDzWpCg/exec";

    document.getElementById('unionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnText');
        btn.innerText = "தகவல்கள் சேமிக்கப்படுகிறது...";
        btn.disabled = true;

        const photoFile = document.getElementById('userPhoto').files[0];
        const reader = new FileReader();

        reader.onload = async function(event) {
            const base64Image = event.target.result;
            const formData = {
                name: document.getElementById('name').value,
                emp_id: document.getElementById('emp_id').value,
                designation: document.getElementById('designation').value,
                district: document.getElementById('district').value,
                mobile: document.getElementById('mobile').value,
                image_data: base64Image 
            };

            try {
                const response = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(formData) });
                const result = await response.json();

                if (result.result === "success") {
                    document.getElementById('card-photo').src = base64Image;
                    document.getElementById('c-name').innerText = formData.name;
                    document.getElementById('c-id').innerText = result.generatedId; 
                    document.getElementById('c-desig').innerText = formData.designation;
                    document.getElementById('c-dist').innerText = formData.district;

                    setTimeout(generatePDF, 1500); 
                }
            } catch (err) {
                alert("பிழை! மீண்டும் முயற்சிக்கவும்.");
                btn.disabled = false;
                btn.innerText = "பதிவு செய்யவும்";
            }
        };
        reader.readAsDataURL(photoFile);
    });

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const element = document.getElementById('id-card-hidden');
        const canvas = await html2canvas(element, { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
        const pdf = new jsPDF('p', 'mm', 'a4');
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 60, 20, 90, 136);
        pdf.save("TVK_Member_ID.pdf");
        location.reload();
    }
</script>

</body>
</html>
