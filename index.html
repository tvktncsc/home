<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVK-TNCSC Union | Digital Portal</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { --maroon: #800000; --gold: #DAA520; --dark: #333; }
        body { font-family: 'Arial', sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        
        /* Navbar */
        nav { background: var(--maroon); padding: 15px 5%; color: white; text-align: center; font-weight: bold; font-size: 1.2rem; }

        /* Container */
        .main-container { max-width: 800px; margin: 30px auto; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 10px solid var(--maroon); }
        .form-header { padding: 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        .form-header h1 { color: var(--maroon); margin: 0; }

        /* Form Styling */
        form { padding: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-group { display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; }
        label { font-weight: bold; margin-bottom: 5px; color: var(--dark); }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; }
        
        .submit-btn { grid-column: span 2; background: var(--maroon); color: white; padding: 15px; border: none; border-radius: 5px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .submit-btn:hover { background: var(--dark); }

        /* Hidden ID Card Template */
        #id-card-hidden { position: absolute; left: -9999px; width: 350px; height: 500px; background: white; border: 5px solid var(--maroon); padding: 20px; text-align: center; }
        .id-photo-box { width: 120px; height: 140px; border: 2px solid var(--maroon); margin: 20px auto; object-fit: cover; }
    </style>
</head>
<body>

<nav>TVK-TNCSC Union - உறுப்பினர் சேர்க்கை</nav>

<div class="main-container">
    <div class="form-header">
        <h1>தமிழக வெற்றிக் கழகம்</h1>
        <p>பணியாளர் மற்றும் தொழிலாளர் சங்கம் (TNCSC)</p>
    </div>

    <form id="unionForm">
        <div class="input-group">
            <label>முழு பெயர் (Tamil)</label>
            <input type="text" id="name" required>
        </div>
        <div class="input-group">
            <label>பணியாளர் எண் (Emp ID)</label>
            <input type="text" id="emp_id" required>
        </div>
        <div class="input-group">
            <label>பதவி (Designation)</label>
            <input type="text" id="designation" placeholder="எ.கா: கண்காணிப்பாளர்" required>
        </div>
        <div class="input-group">
            <label>கைபேசி எண்</label>
            <input type="tel" id="mobile" required>
        </div>
        <div class="input-group full-width">
            <label>மாவட்டம்</label>
            <select id="district" required>
                <option value="">தேர்வு செய்யவும்</option>
                <option value="Chennai North">சென்னை வடக்கு</option>
                <option value="Chennai South">சென்னை தெற்கு</option>
                <option value="Chengalpattu">செங்கல்பட்டு</option>
                <option value="Kallakurichi">கள்ளக்குறிச்சி</option>
                <option value="Kancheepuram">காஞ்சிபுரம்</option>
                </select>
        </div>
        <div class="input-group full-width">
            <label>புகைப்படம் பதிவேற்றவும் (ID Card)</label>
            <input type="file" id="userPhoto" accept="image/*" required>
        </div>
        <button type="submit" class="submit-btn" id="btnText">பதிவு செய்யவும் & PDF பெறவும்</button>
    </form>
</div>

<div id="id-card-hidden">
    <h2 style="color: #800000; margin: 0;">தமிழக வெற்றிக் கழகம்</h2>
    <p style="font-size: 10px; font-weight: bold;">TVK-TNCSC Union</p>
    <img id="card-photo" src="" class="id-photo-box">
    <div style="text-align: left; line-height: 1.8;">
        <p><strong>பெயர்:</strong> <span id="c-name"></span></p>
        <p><strong>எண்:</strong> <span id="c-id"></span></p>
        <p><strong>பதவி:</strong> <span id="c-desig"></span></p>
        <p><strong>மாவட்டம்:</strong> <span id="c-dist"></span></p>
    </div>
    <div style="margin-top: 20px; border-top: 1px solid #ddd; padding-top: 10px; color: #800000; font-weight: bold;">
        "பிறப்பொக்கும் எல்லா உயிர்க்கும்"
    </div>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvgdhnzmUuUbi98w-qFAUJOd3D83wFLO5vWTOU0ZBndv0y56R5ONr-KGHC15DkDzWpCg/exec";

    document.getElementById('unionForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnText');
        btn.innerText = "பதிவு செய்யப்படுகிறது...";
        btn.disabled = true;

        const data = {
            name: document.getElementById('name').value,
            emp_id: document.getElementById('emp_id').value,
            designation: document.getElementById('designation').value,
            district: document.getElementById('district').value,
            mobile: document.getElementById('mobile').value
        };

        const photoFile = document.getElementById('userPhoto').files[0];

        // 1. Save to Google Sheets
        try {
            await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            });

            // 2. Prepare ID Card Preview
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('card-photo').src = event.target.result;
                document.getElementById('c-name').innerText = data.name;
                document.getElementById('c-id').innerText = data.emp_id;
                document.getElementById('c-desig').innerText = data.designation;
                document.getElementById('c-dist').innerText = data.district;

                // 3. Generate PDF
                setTimeout(generatePDF, 1000);
            };
            reader.readAsDataURL(photoFile);

        } catch (err) {
            alert("பிழை ஏற்பட்டது!");
            btn.disabled = false;
        }
    });

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const element = document.getElementById('id-card-hidden');
        const canvas = await html2canvas(element, { scale: 2 });
        const imgData = canvas.toDataURL('image/png');
        
        const pdf = new jsPDF('p', 'mm', 'a4');
        pdf.addImage(imgData, 'PNG', 60, 20, 90, 130);
        pdf.save("TVK_Union_ID.pdf");

        alert("பதிவு முடிந்தது! உங்கள் அடையாள அட்டை பதிவிறக்கம் செய்யப்படுகிறது.");
        location.reload();
    }
</script>

</body>
</html>
